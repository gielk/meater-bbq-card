<svg xmlns="http://www.w3.org/2000/svg" width="820" height="980" viewBox="0 0 820 980" role="img" aria-labelledby="title desc">
  <title id="title">Meater App Card preview</title>
  <desc id="desc">A Home Assistant Mushroom-style card inspired by the Meater app, showing internal, target, ambient and remaining time.</desc>
  <defs>
    <linearGradient id="cardBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#191716"/>
      <stop offset="1" stop-color="#282421"/>
    </linearGradient>
    <linearGradient id="coreBubble" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#b735d6"/>
      <stop offset="1" stop-color="#d84315"/>
    </linearGradient>
    <linearGradient id="targetBubble" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#39b6ff"/>
      <stop offset="1" stop-color="#00a6a6"/>
    </linearGradient>
    <linearGradient id="ambientBubble" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#66d24f"/>
      <stop offset="1" stop-color="#43a047"/>
    </linearGradient>
    <linearGradient id="arc" x1="150" y1="660" x2="670" y2="660" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#405fb8"/>
      <stop offset="0.38" stop-color="#b735d6"/>
      <stop offset="0.68" stop-color="#ff6b2c"/>
      <stop offset="1" stop-color="#8e2c22"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="28" stdDeviation="30" flood-color="#000" flood-opacity="0.30"/>
    </filter>
  </defs>
  <rect width="820" height="980" fill="#11100f"/>
  <g filter="url(#shadow)">
    <rect x="58" y="54" width="704" height="872" rx="38" fill="url(#cardBg)" stroke="#3a3430"/>
    <circle cx="126" cy="126" r="38" fill="#5a2d1f"/>
    <text x="112" y="141" fill="#ff6b2c" font-family="Arial, sans-serif" font-size="34" font-weight="900">M</text>
    <text x="196" y="116" fill="#a9a29b" font-family="Arial, sans-serif" font-size="21" font-weight="800">Cooking</text>
    <text x="196" y="154" fill="#fff8f0" font-family="Arial, sans-serif" font-size="38" font-weight="900">Meater App Card</text>
    <rect x="566" y="100" width="132" height="52" rx="26" fill="#342f2b"/>
    <text x="594" y="134" fill="#a9a29b" font-family="Arial, sans-serif" font-size="17" font-weight="900">Ready 8:30</text>

    <circle cx="205" cy="292" r="66" fill="url(#coreBubble)"/>
    <text x="160" y="310" fill="#fff" font-family="Arial, sans-serif" font-size="44" font-weight="800">54°</text>
    <text x="162" y="382" fill="#a9a29b" font-family="Arial, sans-serif" font-size="20" font-weight="800">Internal</text>

    <circle cx="410" cy="292" r="66" fill="url(#targetBubble)"/>
    <text x="365" y="310" fill="#fff" font-family="Arial, sans-serif" font-size="44" font-weight="800">58°</text>
    <text x="372" y="382" fill="#a9a29b" font-family="Arial, sans-serif" font-size="20" font-weight="800">Target</text>

    <circle cx="615" cy="292" r="66" fill="url(#ambientBubble)"/>
    <text x="562" y="310" fill="#fff" font-family="Arial, sans-serif" font-size="44" font-weight="800">133°</text>
    <text x="574" y="382" fill="#a9a29b" font-family="Arial, sans-serif" font-size="20" font-weight="800">Ambient</text>

    <text x="308" y="452" fill="#ff6b2c" font-family="Arial, sans-serif" font-size="30" font-weight="850">Ribeye cook</text>
    <rect x="118" y="492" width="584" height="300" rx="34" fill="#2b2724"/>
    <path d="M 178 720 A 232 232 0 0 1 642 720" fill="none" stroke="#4a4540" stroke-width="38" stroke-linecap="round"/>
    <path d="M 178 720 A 232 232 0 0 1 642 720" fill="none" stroke="url(#arc)" stroke-width="38" stroke-linecap="round" stroke-dasharray="730" stroke-dashoffset="95"/>
    <polygon points="178,697 218,684 210,728" fill="#b735d6"/>
    <polygon points="410,485 430,528 390,528" fill="#39b6ff"/>
    <polygon points="642,697 602,684 610,728" fill="#43a047"/>

    <rect x="300" y="612" width="220" height="128" rx="34" fill="#241f1c"/>
    <text x="342" y="668" fill="#fff8f0" font-family="Arial, sans-serif" font-size="58" font-weight="300">23m</text>
    <text x="350" y="710" fill="#a9a29b" font-family="Arial, sans-serif" font-size="24" font-weight="800">remaining</text>

    <rect x="178" y="830" width="464" height="62" rx="24" fill="#2b2724"/>
    <circle cx="220" cy="861" r="18" fill="#5a2d1f"/>
    <text x="246" y="868" fill="#a9a29b" font-family="Arial, sans-serif" font-size="21" font-weight="850">Ribeye cook · Cooking · 93%</text>
  </g>
</svg>
